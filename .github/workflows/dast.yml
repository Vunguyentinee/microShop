name: DAST Baseline Scan

on:
  push:
    branches: [ "main" , "dev_vu", "fix_hung" ]

jobs:
  zap_scan:
    runs-on: ubuntu-latest
    name: Quy trình Kiểm duyệt DAST Tự động

    steps:

      - name: 1. Checkout source
        uses: actions/checkout@v4

      - name: 2. Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: 3. Build WAR (Maven)
        run: mvn clean package -DskipTests

      - name: 4. Build Docker image
        run: docker build -t micro-shop-app .

      - name: 5. Run container
        run: |
          docker run -d -p 8080:8080 --name micro-shop-test micro-shop-app
          echo "Waiting for application..."
          until curl -s http://localhost:8080/microShop > /dev/null; do
            sleep 5
          done
          echo "Application is ready"

      - name: 6. Run OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:8080/microShop'
          issue_title: 'Kết quả kiểm duyệt DAST - Baseline'
          cmd_options: '-J zap-report.json'
          fail_action: false

      - name: 7. Debug files
        run: ls -la

      - name: 8. Save baseline report
        uses: actions/upload-artifact@v4
        with:
          name: zap-baseline
          path: zap-report.json