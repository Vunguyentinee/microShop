name: DAST Scan for MicroShop

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  zap_scan:
    runs-on: ubuntu-latest
    name: Build and Scan with ZAP
    
    # Cấp quyền ghi để ZAP có thể tự tạo Issue báo lỗi trên GitHub cho Vũ
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        # Bỏ qua Unit Test bị lỗi Mockito/Java 25 để tập trung lấy file .war
        run: mvn clean package -DskipTests

      - name: Start Services with Docker Compose
        # Dựng cả App và SQL Server cùng lúc trên GitHub
        run: docker-compose up --build -d

      - name: Wait for Tomcat to be ready
        # Chờ 30 giây để đảm bảo Database và Tomcat khởi động xong hoàn toàn
        run: sleep 30s

      - name: OWASP ZAP Full Scan
        uses: zaproxy/action-full-scan@v0.12.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          docker_name: 'ghcr.io/zaproxy/zaproxy:stable'
          # Quét vào localhost vì Docker Compose đã ánh xạ cổng 8080 ra ngoài
          target: 'http://localhost:8080/'
          # Không làm đỏ quy trình khi tìm thấy lỗi để bạn luôn có kết quả báo cáo
          fail_action: false
          # Tên của mạng nội bộ Docker để ZAP có thể kết nối
          network_name: 'microshop_default'

      - name: Stop Services
        if: always()
        run: docker-compose down